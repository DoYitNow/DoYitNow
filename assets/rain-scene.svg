<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1175 500" role="img" aria-labelledby="title desc">
  <title id="title">Flat black and white rainy scene</title>
  <desc id="desc">A 2.35 to 1 monochrome flat line-art rain scene with dense rain, wet ground, and animated ground ripples.</desc>
  <style>
    :root {
      color-scheme: light;
    }

    svg {
      background: transparent;
    }

    .line {
      fill: none;
      stroke: #101010;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .thin { stroke-width: 1; }
    .medium { stroke-width: 1.6; }
    .bold { stroke-width: 2.5; }
    .soft { opacity: .45; }
    .faint { opacity: .22; }
    .haze { opacity: .12; }

    .rain {
      animation: rainFall var(--dur, 1.2s) linear infinite;
      animation-delay: var(--delay, 0s);
      opacity: var(--alpha, .58);
    }

    .rain line {
      stroke-width: var(--w, 1.15);
    }

    .ripple {
      animation: rippleExpand var(--dur, 2.65s) ease-out infinite;
      animation-delay: var(--delay, 0s);
      transform-box: fill-box;
      transform-origin: center;
      opacity: 0;
    }

    .impact-drop {
      animation: impactDrop var(--dur, 2.65s) ease-in infinite;
      animation-delay: var(--delay, 0s);
      stroke-dasharray: 96 128;
      stroke-dashoffset: 128;
      opacity: 0;
    }

    .ground-line {
      animation: groundShiver 5s ease-in-out infinite;
    }

    .ground-line:nth-child(2n) {
      animation-delay: -1.7s;
      animation-duration: 6.2s;
    }

    .cloud-line {
      animation: cloudDrift 12s linear infinite;
    }

    .cloud-line:nth-child(2n) {
      animation-delay: -4s;
      animation-duration: 15s;
    }

    @keyframes rainFall {
      from { transform: translate(80px, -560px); }
      to { transform: translate(-120px, 540px); }
    }

    @keyframes rippleExpand {
      0% { transform: scale(.16); opacity: 0; stroke-dashoffset: 18; }
      12% { opacity: .82; }
      68% { opacity: .28; }
      100% { transform: scale(1.85); opacity: 0; stroke-dashoffset: 0; }
    }

    @keyframes impactDrop {
      0% { opacity: 0; stroke-dashoffset: 128; }
      12% { opacity: .68; }
      44% { opacity: .68; stroke-dashoffset: 0; }
      58% { opacity: 0; stroke-dashoffset: 0; }
      100% { opacity: 0; stroke-dashoffset: 0; }
    }

    @keyframes groundShiver {
      0%, 100% { transform: translateX(0); opacity: .25; }
      50% { transform: translateX(-8px); opacity: .5; }
    }

    @keyframes cloudDrift {
      from { transform: translateX(0); opacity: .18; }
      50% { opacity: .3; }
      to { transform: translateX(-60px); opacity: .18; }
    }

    @media (prefers-reduced-motion: reduce) {
      .rain,
      .ripple,
      .impact-drop,
      .ground-line,
      .cloud-line {
        animation: none;
      }
    }
  </style>

  <defs>
    <clipPath id="scene-clip">
      <rect x="0" y="0" width="1175" height="500" />
    </clipPath>

    <clipPath id="rain-ground-clip">
